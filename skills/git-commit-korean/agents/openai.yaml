interface:
  display_name: "Git Commit Korean"
  short_description: "이 저장소의 커밋 히스토리에 맞춰 한국어 커밋 메시지를 작성하거나 커밋한다."
  default_prompt: "Use $git-commit-korean to inspect the diff, write a Korean commit message that matches this repository, and create the commit."

policy:
  allow_implicit_invocation: true
