<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eco Knock Admin</title>
    <link rel="stylesheet" href="../../static/admin/admin.css" th:href="@{/admin/admin.css}">
</head>
<body>
<main class="admin-home">
    <header class="admin-header">
        <div>
            <p class="eyebrow">ECO-KNOCK ADMIN</p>
            <h1>관리자 기능</h1>
        </div>
        <form method="post" th:action="@{/admin/logout}">
            <button type="submit" class="ghost-button">로그아웃</button>
        </form>
    </header>

    <section class="feature-panel" aria-labelledby="featureTitle">
        <div>
            <h2 id="featureTitle">기본 모아두기 설정하기</h2>
            <p>신규 초기화와 reset 시 복사될 기본 shortcut 목록을 관리합니다.</p>
        </div>
        <a class="primary-button" th:href="@{/admin/overview-shortcuts}">열기</a>
    </section>
</main>
</body>
</html>
