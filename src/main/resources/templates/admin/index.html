<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eco Knock Admin</title>
    <link rel="stylesheet" href="../../static/admin/admin.css" th:href="@{/admin/admin.css}">
</head>
<body>
<main class="admin-home">
    <header class="admin-header">
        <div>
            <p class="eyebrow">ECO-KNOCK ADMIN</p>
            <h1>관리자 기능</h1>
        </div>
        <form method="post" th:action="@{/admin/logout}">
            <button type="submit" class="ghost-button">로그아웃</button>
        </form>
    </header>

    <section class="feature-panel" aria-labelledby="featureTitle">
        <div>
            <h2 id="featureTitle">기본 모아두기 설정하기</h2>
            <p>신규 초기화와 reset 시 복사될 기본 shortcut 목록을 관리합니다.</p>
        </div>
        <a class="primary-button" th:href="@{/admin/overview-shortcuts}">열기</a>
    </section>

    <section class="feature-panel api-doc-panel" aria-labelledby="apiDocTitle">
        <div>
            <h2 id="apiDocTitle">API 문서 공개 설정</h2>
            <p>Scalar와 OpenAPI JSON 접근을 Redis 토글 값으로 제어합니다.</p>
            <div id="apiDocStatus" class="status-pill" data-enabled="false">확인 중</div>
        </div>
        <div class="button-group">
            <a class="ghost-button" th:href="@{/scalar}" target="_blank" rel="noreferrer">Scalar 열기</a>
            <button id="apiDocToggle" type="button" class="primary-button" disabled>불러오는 중</button>
        </div>
    </section>
</main>
<script src="../../static/admin/api-docs-access.js" th:src="@{/admin/api-docs-access.js}"></script>
</body>
</html>
