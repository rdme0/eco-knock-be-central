<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eco Knock Admin</title>
    <link rel="stylesheet" href="../../static/admin/admin.css" th:href="@{/admin/admin.css}">
</head>
<body>
<main class="admin-home">
    <header class="admin-header">
        <div>
            <p class="eyebrow">ECO-KNOCK ADMIN</p>
            <h1>관리자 기능</h1>
        </div>
        <form method="post" th:action="@{/admin/logout}">
            <button type="submit" class="ghost-button">로그아웃</button>
        </form>
    </header>

    <section class="feature-panel" aria-labelledby="featureTitle">
        <div>
            <h2 id="featureTitle">기본 모아두기 설정하기</h2>
            <p>신규 초기화와 reset 시 복사될 기본 shortcut 목록을 관리합니다.</p>
        </div>
        <a class="primary-button" th:href="@{/admin/overview-shortcuts}">열기</a>
    </section>

    <section class="feature-panel api-doc-panel" aria-labelledby="apiDocTitle">
        <div>
            <h2 id="apiDocTitle">API 문서 공개 설정</h2>
            <p>Scalar와 OpenAPI JSON 접근을 Redis 토글 값으로 제어합니다.</p>
            <div id="apiDocStatus" class="status-pill" data-enabled="false">확인 중</div>
        </div>
        <div class="button-group">
            <a class="ghost-button" th:href="@{/scalar}" target="_blank" rel="noreferrer">Scalar 열기</a>
            <label class="switch-control">
                <input id="apiDocToggle" type="checkbox" role="switch" aria-label="API 문서 공개 설정" disabled>
                <span class="switch-track" aria-hidden="true"></span>
            </label>
        </div>
    </section>

    <section class="feature-panel control-setting-panel" aria-labelledby="controlSettingTitle">
        <div>
            <h2 id="controlSettingTitle">자동제어 정책 설정</h2>
            <p>공기청정기 자동 ON/OFF 기준과 사용 여부를 관리합니다.</p>
            <div id="controlSettingStatus" class="status-pill" data-enabled="false">확인 중</div>
        </div>
        <div class="button-group">
            <a class="primary-button" th:href="@{/admin/control-settings}">열기</a>
            <label class="switch-control">
                <input id="controlSettingToggle" type="checkbox" role="switch" aria-label="자동제어 사용 설정" disabled>
                <span class="switch-track" aria-hidden="true"></span>
            </label>
        </div>
    </section>
</main>
<script src="../../static/admin/admin-home.js" th:src="@{/admin/admin-home.js}"></script>
</body>
</html>
