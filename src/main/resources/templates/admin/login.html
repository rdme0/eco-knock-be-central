<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eco Knock Admin</title>
    <link rel="stylesheet" href="../../static/admin/login.css" th:href="@{/admin/login.css}">
</head>
<body>
<main class="login-page">
    <section class="login-card" aria-labelledby="loginTitle">
        <p class="eyebrow">ECO-KNOCK ADMIN</p>
        <h1 id="loginTitle">관리자 로그인</h1>
        <p class="description">프로젝트 관리자 계정 또는 마스터 비밀번호로 접근합니다.</p>

        <div class="login-actions">
            <a class="primary-button" th:if="${ssoLoginUrl != null}" th:href="${ssoLoginUrl}">SSO로 로그인</a>
            <p class="error" th:if="${ssoLoginUrl == null}">
                관리자 redirect origin이 허용되지 않았습니다.
            </p>

            <form method="post" th:action="@{/admin/login/master}">
                <label for="password">마스터 비밀번호</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
                <button type="submit">마스터 비밀번호로 로그인</button>
            </form>
        </div>

        <p class="error" th:if="${errorMessage != null}" th:text="${errorMessage}"></p>
    </section>
</main>
</body>
</html>
