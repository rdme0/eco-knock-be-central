spring:
  application:
    name: eco-knock-be-central
  datasource:
    url: jdbc:postgresql://${DEV_POSTGRES_HOST:localhost}:${DEV_POSTGRES_PORT:5432}/ecoknock
    username: ${DEV_POSTGRES_USERNAME:postgres}
    password: ${DEV_POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties.hibernate.format_sql: true
    defer-datasource-initialization: false
    hibernate.ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${DEV_REDIS_HOST:localhost}
      port: ${DEV_REDIS_PORT:6379}
  threads:
    virtual:
      enabled: true
server:
  port: 18081

security:
  auth-policy:
    access-token-ttl: 6h
    refresh-token-ttl: 60d
  jwt:
    secret-key: ${JWT_SECRET_KEY}
  aes256:
    key: ${AES256_KEY}
  uri:
    allowed-front-end-origins:
      - http://localhost:*
      - https://localhost:*

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: unrestricted

embedded:
  grpc:
    host: localhost
    port: 6565
    timeout: 3s
