spring:
  application:
    name: eco-knock-be-central
  profiles:
    default: dev
  jpa:
    properties.hibernate.format_sql: true
    defer-datasource-initialization: false
    hibernate.ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
server:
  port: 18081

security:
  auth-policy:
    access-token-ttl: 6h
    refresh-token-ttl: 60d
  admin:
    master-password: ${ADMIN_MASTER_PASSWORD}
    master-token-ttl: 1h
  jwt:
    secret-key: ${JWT_SECRET_KEY}
  aes256:
    key: ${AES256_KEY}
  uri:
    allowed-front-end-origins:
      - http://localhost:*
      - https://localhost:*
    allowed-admin-origins:
      - http://localhost:*
      - https://localhost:*
      - ${PROD_THIS_SERVER_URL}

sso:
  base-url: https://auth.econovation.kr
  client-id: ${SSO_CLIENT_ID}

whozin:
  base-url: https://be.whozin.econovation.kr
  token: ${WHOZIN_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      access: unrestricted

embedded:
  grpc:
    host: localhost
    port: 6565
    timeout: 3s
