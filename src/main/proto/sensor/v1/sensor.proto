syntax = "proto3";

package sensor.v1;

option java_multiple_files = true;
option java_package = "jnu.econovation.ecoknockbecentral.grpc.sensor.v1";

message GetCurrentSensorRequest {}

message GetCurrentSensorResponse {
  double temperature_c = 1;
  double humidity_rh = 2;
  double gas_resistance_ohm = 3;
  uint32 status = 4;
  bool gas_valid = 5;
  bool heat_stable = 6;
  int64 measured_at_unix_ms = 7;
}

service SensorService {
  rpc GetCurrentSensor(GetCurrentSensorRequest) returns (GetCurrentSensorResponse);
}
