name: eco-knock-dev

services:
  postgres:
    image: postgres:latest
    container_name: eco-knock-dev-postgres
    environment:
      POSTGRES_DB: ecoknock
      POSTGRES_USER: ${DEV_POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Seoul
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: eco-knock-dev-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${DEV_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: eco-knock-dev-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    container_name: eco-knock-dev-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_MASTER_PASSWORD}
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${DEV_GRAFANA_URL}:${DEV_GRAFANA_PORT}
    ports:
      - "${DEV_GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../shared/grafana/startup.sh:/etc/grafana/startup.sh:ro
      - ../shared/grafana/provisioning:/etc/grafana/provisioning:ro
    entrypoint: [ "sh", "/etc/grafana/startup.sh" ]
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
