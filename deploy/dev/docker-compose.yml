name: eco-knock-dev

services:
  postgres:
    image: postgres:latest
    container_name: eco-knock-dev-postgres
    environment:
      POSTGRES_DB: ecoknock
      POSTGRES_USER: ${DEV_POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Seoul
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: eco-knock-dev-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${DEV_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
