name: eco-knock-prod

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/prod/Dockerfile
    image: eco-knock-be-central:prod
    container_name: eco-knock-prod-app
    env_file:
      - ../../.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${PROD_SERVER_PORT:-18081}:18081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:latest
    container_name: eco-knock-prod-postgres
    environment:
      POSTGRES_DB: ecoknock
      POSTGRES_USER: ${PROD_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${PROD_POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${PROD_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: eco-knock-prod-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "${PROD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: eco-knock-prod-prometheus
    environment:
      EMBEDDED_SERVER_HOST: ${EMBEDDED_SERVER_HOST}
    command:
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../shared/prometheus/startup.sh:/etc/prometheus/startup.sh:ro
      - prometheus-data:/prometheus
    depends_on:
      - app
    entrypoint: [ "sh", "/etc/prometheus/startup.sh" ]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.0
    container_name: eco-knock-prod-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_MASTER_PASSWORD}
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${PROD_GRAFANA_HOST}
    ports:
      - "${PROD_GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../shared/grafana/startup.sh:/etc/grafana/startup.sh:ro
      - ../shared/grafana/provisioning:/etc/grafana/provisioning:ro
    entrypoint: [ "sh", "/etc/grafana/startup.sh" ]
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
